name: Validate challenge repository

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-challenges-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  manifests:
    name: Validate manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate event and challenge manifests
        run: node scripts/validate.mjs

      - name: Compile Python examples
        run: python3 -m compileall -q AD Koth Jeopardy

      - name: Exercise checker verdicts
        run: python3 scripts/test-checkers.py

  containers:
    name: Build ${{ matrix.name }}
    needs: manifests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: static-flag-service
            context: Jeopardy/Web/static-flag-service/src
          - name: dynamic-flag-service
            context: Jeopardy/Web/dynamic-flag-service/src
          - name: attack-defense-service
            context: AD/Pwn/attack-defense-service/src
          - name: self-hosted-service
            context: AD/Web/self-hosted-service/src
          - name: king-of-the-hill
            context: Koth/Pwn/king-of-the-hill/src
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build without pushing
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
