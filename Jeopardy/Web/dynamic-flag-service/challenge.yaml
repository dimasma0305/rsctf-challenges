# A DynamicContainer gets one isolated container and flag per participation.
name: "Dynamic Container: Personal Flag Service"
author: "rsctf documentation team"
description: |
  Create your instance and open its HTTP endpoint. rsctf derives a team-specific
  flag from this challenge's flagTemplate and injects it as RSCTF_FLAG.

  Another team's flag should not solve your instance.
type: DynamicContainer
category: Web
minScoreRate: 0.25
difficulty: 4
submissionLimit: 20

# The generator expands [TEAM_HASH], [GUID], and [UUID], but current challenge
# validation expects TEAM_HASH or GUID. TEAM_HASH is stable per team/challenge.
flagTemplate: "rsctf{dynamic_[TEAM_HASH]}"

container:
  # containerImage is intentionally omitted. Repository Bindings auto-builds
  # ./src/Dockerfile, whose app follows the RSCTF_FLAG contract.
  memoryLimit: 64
  cpuCount: 1
  exposePort: 8080
